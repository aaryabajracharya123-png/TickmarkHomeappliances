<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – Tick Mark Home Appliances</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container mt-4 mb-5">
    <div class="row mt-4">

      <!-- ── Sidebar ───────────────────────────────── -->
      <div class="col-lg-3 col-md-4 mb-4">
        <div class="card border-0 shadow-sm p-4 sticky-top" style="top:90px;border-radius:15px">

          <h6 class="fw-bold mb-3">Filter By Category</h6>
          <div class="mb-4" id="categoryFilters"></div>

          <hr class="opacity-50">

          <h6 class="fw-bold mb-3">Price Range</h6>
          <div class="px-1">
            <input type="range" class="form-range custom-range" id="priceRange"
                   min="0" max="150000" step="1000" value="150000"
                   oninput="priceDisplay.textContent = this.value; applyFilters()">
            <div class="d-flex justify-content-between mt-2 small fw-bold text-muted">
              <span>0</span>
              <span style="color:var(--brand-green)">रु. <span id="priceDisplay">150000</span></span>
            </div>
            <a href="products.html" class="btn btn-link btn-sm w-100 mt-1 text-decoration-none text-muted">Clear All</a>
          </div>
        </div>
      </div>

      <!-- ── Product grid ──────────────────────────── -->
      <div class="col-lg-9 col-md-8">
        <div class="row g-4" id="productGrid"></div>
      </div>

    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = getNavbar();
    document.getElementById('footer-placeholder').innerHTML = getFooter();
    initSearch();

    // Read URL params
    const params = new URLSearchParams(location.search);
    let activeCat  = params.get('category') || '';
    let activeBrand = params.get('brand') || '';

    // Build category radio buttons
    const catBox = document.getElementById('categoryFilters');
    CATEGORIES.forEach(cat => {
      catBox.innerHTML += `
      <div class="form-check mb-2">
        <input class="form-check-input custom-check" type="radio" name="category"
               value="${cat}" id="cat_${cat}" onchange="activeCat=this.value;applyFilters()"
               ${activeCat === cat ? 'checked' : ''}>
        <label class="form-check-label text-muted" for="cat_${cat}">${cat}</label>
      </div>`;
    });

    function applyFilters() {
      const maxPrice = +document.getElementById('priceRange').value;
      let list = PRODUCTS.filter(p => {
        if (activeCat && p.category !== activeCat) return false;
        if (activeBrand && p.brand !== activeBrand) return false;
        if (p.price > maxPrice) return false;
        return true;
      });
      renderGrid(list);
    }

    function renderGrid(list) {
      const grid = document.getElementById('productGrid');
      if (!list.length) {
        grid.innerHTML = `<div class="col-12 text-center py-5">
          <h4 class="text-muted">No products match these filters.</h4>
          <a href="products.html" class="btn btn-outline-primary mt-3">Clear Filters</a>
        </div>`;
        return;
      }
      grid.innerHTML = list.map(p => productCard(p)).join('');
    }

    // Show active brand label if filtering by brand
    if (activeBrand) {
      const heading = document.createElement('h5');
      heading.className = 'mb-4 text-muted';
      heading.textContent = `Brand: ${activeBrand}`;
      document.getElementById('productGrid').before(heading);
    }

    applyFilters();
  </script>
</body>
</html>

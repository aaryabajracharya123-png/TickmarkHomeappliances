<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search – Tick Mark Home Appliances</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container mt-4 mb-5">
    <div id="search-header" class="mb-4"></div>
    <div class="row g-4" id="resultsGrid"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = getNavbar();
    document.getElementById('footer-placeholder').innerHTML = getFooter();
    initSearch();

    const q = new URLSearchParams(location.search).get('q') || '';
    const qLower = q.toLowerCase();

    document.title = `Search: "${q}" – Tick Mark Home Appliances`;

    const header = document.getElementById('search-header');
    header.innerHTML = `<h2 class="fw-bold">Search Results for "<span style="color:var(--brand-green)">${q}</span>"</h2>`;

    // Pre-fill search box
    const input = document.getElementById('searchInput');
    if (input) input.value = q;

    const results = PRODUCTS.filter(p =>
      p.name.toLowerCase().includes(qLower) ||
      p.brand.toLowerCase().includes(qLower) ||
      p.category.toLowerCase().includes(qLower) ||
      p.description.toLowerCase().includes(qLower)
    );

    const grid = document.getElementById('resultsGrid');
    if (results.length) {
      header.innerHTML += `<p class="text-muted">${results.length} product${results.length !== 1 ? 's' : ''} found</p>`;
      grid.innerHTML = results.map(p => productCard(p)).join('');
    } else {
      grid.innerHTML = `
      <div class="col-12 text-center py-5">
        <i class="bi bi-search fs-1 text-muted mb-3 d-block"></i>
        <h4 class="text-muted">No products found for "${q}"</h4>
        <p class="text-muted">Try a different keyword like "TV", "AC", or "LG"</p>
        <a href="products.html" class="btn btn-outline-primary btn-lg px-5 mt-2">Browse All Products</a>
      </div>`;
    }
  </script>
</body>
</html>

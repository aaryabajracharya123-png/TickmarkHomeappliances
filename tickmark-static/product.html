<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – Tick Mark Home Appliances</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container mt-4 mb-5">
    <div id="detail-content"></div>
    <div id="similar-section"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = getNavbar();
    document.getElementById('footer-placeholder').innerHTML = getFooter();
    initSearch();

    const id = +new URLSearchParams(location.search).get('id');
    const product = PRODUCTS.find(p => p.id === id);

    if (!product) {
      document.getElementById('detail-content').innerHTML =
        `<div class="text-center py-5"><h3 class="text-muted">Product not found.</h3>
         <a href="products.html" class="btn btn-outline-primary mt-3">Browse Products</a></div>`;
    } else {
      document.title = product.name + ' – Tick Mark Home Appliances';

      const priceHTML = product.on_sale
        ? `<p class="mb-1"><span class="text-decoration-line-through text-muted fs-5">${formatNPR(product.price)}</span></p>
           <p class="fs-4 fw-bold text-danger mb-3">${formatNPR(product.sale_price)}</p>`
        : `<p class="fs-4 fw-bold text-dark mb-3">${formatNPR(product.price)}</p>`;

      document.getElementById('detail-content').innerHTML = `
      <div class="product-detail-wrapper">
        <div class="row bg-white rounded-4 shadow-sm p-4">
          <div class="col-md-5 text-center">
            <img src="${product.image_url}" alt="${product.name}"
                 class="img-fluid rounded-3 product-image"
                 onerror="this.src='https://via.placeholder.com/450x350?text=Product'">
          </div>
          <div class="col-md-7">
            <nav aria-label="breadcrumb" class="mb-2">
              <ol class="breadcrumb small">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="products.html?category=${encodeURIComponent(product.category)}"
                   class="text-decoration-none">${product.category}</a></li>
                <li class="breadcrumb-item active">${product.name}</li>
              </ol>
            </nav>
            <h2 class="fw-bold mb-3">${product.name}</h2>
            <p class="text-muted mb-2">${product.brand} • ${product.model}</p>
            <span class="badge bg-secondary mb-3">${product.category}</span>
            <hr>
            <p class="product-description">${product.description}</p>
            <div class="mt-4">
              ${priceHTML}
            </div>
            <a href="https://wa.me/9779803971968?text=Hello!%20I%20am%20interested%20in%20${encodeURIComponent(product.name)}"
               class="btn btn-success px-4 py-2 rounded-pill" target="_blank">
              <i class="bi bi-whatsapp"></i> Enquire Us
            </a>
            <a href="products.html" class="btn btn-outline-secondary ms-2 px-4 py-2 rounded-pill">
              ← Back
            </a>
          </div>
        </div>
      </div>`;

      // Similar products
      const similar = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 8);
      if (similar.length) {
        const cards = similar.map(item => `
        <div class="similar-card">
          <a href="product.html?id=${item.id}" class="text-decoration-none text-dark">
            <img src="${item.image_url}" alt="${item.name}" class="similar-image"
                 onerror="this.src='https://via.placeholder.com/200x150?text=Product'">
            <div class="p-2">
              <h6 class="similar-title">${item.name}</h6>
              <p class="similar-price mb-0">${formatNPR(item.on_sale ? item.sale_price : item.price)}</p>
            </div>
          </a>
        </div>`).join('');

        document.getElementById('similar-section').innerHTML = `
        <div class="similar-products-section mt-5">
          <h4 class="mb-4 fw-bold">Similar Products</h4>
          <div class="similar-slider">${cards}</div>
        </div>`;
      }
    }
  </script>
</body>
</html>
